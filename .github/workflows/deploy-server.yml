name: Deploy Server to Render

on:
  push:
    branches: [main]
    paths:
      - server/**
      - .github/workflows/deploy-server.yml
  workflow_dispatch:
    description: 'Manually trigger server deployment'

jobs:
  deploy-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci --prefer-offline || npm install --prefer-offline

      - name: Run server tests
        working-directory: ./server
        run: npm test || echo "No test script found"
        env:
          CI: true

      - name: Run server linter
        working-directory: ./server
        run: npm run lint || echo "No lint script found"

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "Triggering deployment to Render..."
          curl -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"revision": "main", "env": "production"}' \
            "https://api.render.com/deploy/${SERVICE_ID}" || {
              echo "Deployment failed!"
              exit 1
            }
          echo "Deployment triggered successfully!"

      - name: Deployment status
        run: |
          echo "Server deployment triggered!"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
